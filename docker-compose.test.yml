services:
  postgres-test:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
      POSTGRES_DB: devhunt_test
    ports:
      - "5433:5432" # different port to avoid conflict with dev postgres
    tmpfs:
      - /var/lib/postgresql/data # in-memory for speed, data lost on stop
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test"]
      interval: 5s
      timeout: 5s
      retries: 5
